# Observability Configuration Example

# This file shows how to configure metrics and tracing for the crawler application.
# Copy this to your config.yaml and adjust as needed.

# Observability settings
observability:
  # Metrics collection (Prometheus)
  metrics:
    enabled: true
    port: 9090  # HTTP port for /metrics endpoint

  # Distributed tracing (OpenTelemetry)
  tracing:
    enabled: true
    service_name: "crawler"
    otlp_endpoint: "http://localhost:4317"  # Jaeger OTLP endpoint
    console_export: false  # Set to true for debugging

# Example: Full configuration with observability
sources:
  confluence:
    - name: "my-confluence"
      url: "https://mycompany.atlassian.net"
      username: "user@example.com"
      api_token: "${CONFLUENCE_API_TOKEN}"
      spaces:
        - key: "PROJ"
          name: "Project Space"

  jira:
    - name: "my-jira"
      url: "https://mycompany.atlassian.net"
      username: "user@example.com"
      api_token: "${JIRA_API_TOKEN}"
      projects:
        - key: "PROJ"
          name: "Project"

output:
  base_dir: "./sources"

sync:
  state_file: "./.atlassian-sync-state.json"

error_handling:
  max_retries: 3
  retry_delay: 5
  error_log: "./errors.log"

llm:
  provider: "openai"
  base_url: "http://127.0.0.1:1234/v1"
  model: "qwen3.5-4b"
  max_tokens: 2000
  temperature: 0.7

logging:
  level: "INFO"
  format: "json"
  file: "./crawler.log"

# Enable observability
observability:
  metrics:
    enabled: true
    port: 9090
  tracing:
    enabled: true
    service_name: "crawler"
    otlp_endpoint: "http://localhost:4317"
