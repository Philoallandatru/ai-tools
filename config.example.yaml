# Atlassian 知识管理系统配置示例

sources:
  confluence:
    # Confluence Cloud 配置
    - name: "my-confluence-cloud"
      type: "cloud"  # 可选，默认为 cloud
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"  # Cloud 必需
      api_token: "your-api-token"  # Cloud API Token
      spaces:
        - key: "SPACE1"
          name: "Space 1"

    # Confluence Server 配置
    - name: "my-confluence-server"
      type: "server"  # 必须指定为 server
      url: "https://confluence.your-company.com"
      api_token: "your-personal-access-token"  # Server PAT
      # username 不需要（Server 使用 PAT 认证）
      spaces:
        - key: "DEV"
          name: "Development"

  jira:
    # Jira Cloud 配置
    - name: "my-jira-cloud"
      type: "cloud"  # 可选，默认为 cloud
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"  # Cloud 必需
      api_token: "your-api-token"  # Cloud API Token
      projects:
        - key: "PROJ"
          name: "Project"

    # Jira Server 配置
    - name: "my-jira-server"
      type: "server"  # 必须指定为 server
      url: "https://jira.your-company.com"
      api_token: "your-personal-access-token"  # Server PAT
      # username 不需要（Server 使用 PAT 认证）
      projects:
        - key: "DEV"
          name: "Development"

output:
  base_dir: "./sources"

sync:
  state_file: "./.atlassian-sync-state.json"

error_handling:
  max_retries: 3
  retry_delay: 5
  error_log: "./sync-errors.log"

# 认证说明：
#
# Cloud 版本：
#   - 需要 username（邮箱）和 API Token
#   - API Token 生成：https://id.atlassian.com/manage-profile/security/api-tokens
#   - type: "cloud" 或省略（默认）
#
# Server 版本：
#   - 只需要 Personal Access Token (PAT)
#   - PAT 生成：在 Server 实例的个人设置中创建
#   - type: "server" 必须指定
#   - 不需要 username
