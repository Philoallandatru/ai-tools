# Atlassian 知识管理系统配置示例

sources:
  confluence:
    # Confluence Cloud 配置
    - name: "my-confluence-cloud"
      type: "cloud"  # 可选，默认为 cloud
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"  # Cloud 必需
      api_token: "your-api-token"  # Cloud API Token
      spaces:
        - key: "SPACE1"
          name: "Space 1"
          max_pages: 100  # 可选：限制拉取的最大页面数（用于测试）
          root_page_id: "123456"  # 可选：只抓取此页面及其子页面

    # Confluence Server 配置
    - name: "my-confluence-server"
      type: "server"  # 必须指定为 server
      url: "https://confluence.your-company.com"
      api_token: "your-personal-access-token"  # Server PAT
      # username 不需要（Server 使用 PAT 认证）
      spaces:
        - key: "DEV"
          name: "Development"

  jira:
    # Jira Cloud 配置
    - name: "my-jira-cloud"
      type: "cloud"  # 可选，默认为 cloud
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"  # Cloud 必需
      api_token: "your-api-token"  # Cloud API Token
      projects:
        - key: "PROJ"
          name: "Project"

    # Jira Server 配置
    - name: "my-jira-server"
      type: "server"  # 必须指定为 server
      url: "https://jira.your-company.com"
      api_token: "your-personal-access-token"  # Server PAT
      # username 不需要（Server 使用 PAT 认证）
      projects:
        - key: "DEV"
          name: "Development"

output:
  base_dir: "./sources"

sync:
  state_file: "./.atlassian-sync-state.json"
  max_workers: 5  # 并发数（1-10），默认 5

error_handling:
  max_retries: 3
  retry_delay: 5
  error_log: "./sync-errors.log"

# LLM 配置
llm:
  provider: "llmstudio"  # 可选: "mock", "llmstudio"
  base_url: "http://localhost:1234/v1"
  model: "qwen2.5-14b-instruct"
  max_tokens: 2000
  temperature: 0.7

# Vision LLM 配置（用于图像分析）
vision_llm:
  enabled: false  # 是否启用 Vision 功能
  provider: "llmstudio"
  base_url: "http://localhost:1234/v1"
  model: "llava-v1.6-mistral-7b"
  max_tokens: 1000
  temperature: 0.7

# 报告生成配置
reports:
  output_dir: "./reports"

  # 报告分析配置（智能分析功能）
  report_analysis:
    enabled: true  # 是否启用智能分析
    analyzers:
      - name: "report_summary"
        max_tokens: 500
      - name: "key_insights"
        max_tokens: 800
      - name: "risk_analysis"
        max_tokens: 600

# 定时同步配置
scheduler:
  enabled: false  # 是否启用定时同步
  interval: 3600  # 同步间隔（秒），默认 1 小时

  # 性能配置
  performance:
    max_workers: 5  # 并发数
    batch_size: 50  # 批处理大小

# 知识检索配置
knowledge:
  retriever:
    enabled: true  # 是否启用知识检索
    top_k: 5  # 返回前 K 个最相关的结果
    min_score: 0.3  # 最小相似度分数（0-1）

# 认证说明：
#
# Cloud 版本：
#   - 需要 username（邮箱）和 API Token
#   - API Token 生成：https://id.atlassian.com/manage-profile/security/api-tokens
#   - type: "cloud" 或省略（默认）
#
# Server 版本：
#   - 只需要 Personal Access Token (PAT)
#   - PAT 生成：在 Server 实例的个人设置中创建
#   - type: "server" 必须指定
#   - 不需要 username
#
# Confluence 高级选项：
#   - max_pages: 限制拉取的最大页面数，用于测试或初步验证
#   - root_page_id: 只抓取指定页面及其子页面，用于部分同步
#
# LLM 配置说明：
#   - provider: "mock" 用于测试，"llmstudio" 用于实际 LLM 调用
#   - base_url: LLM Studio 服务地址
#   - model: 使用的模型名称
#   - max_tokens: 生成的最大 token 数
#   - temperature: 生成温度（0-1），越高越随机
#
# 报告分析说明：
#   - enabled: 控制是否启用智能分析功能
#   - analyzers: 配置各个分析器的参数
#     * report_summary: 生成执行摘要
#     * key_insights: 识别关键发现
#     * risk_analysis: 评估潜在风险
