# Atlassian 知识管理系统配置示例

sources:
  confluence:
    # Confluence Cloud 配置
    - name: "my-confluence-cloud"
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"
      api_token: "your-api-token-here"
      spaces:
        - key: "SPACE1"
          name: "Space 1"
          # max_pages: 10              # 可选：限制拉取的最大页面数（用于测试）
          # root_page_id: "123456"     # 可选：只抓取指定页面及其子页面

  jira:
    # Jira Cloud 配置
    - name: "my-jira-cloud"
      url: "https://your-domain.atlassian.net"
      username: "your-email@example.com"
      api_token: "your-api-token-here"
      projects:
        - key: "PROJ"
          name: "Project Name"

output:
  base_dir: "./sources"

sync:
  state_file: "./.atlassian-sync-state.json"

error_handling:
  max_retries: 3
  retry_delay: 5
  error_log: "./sync-errors.log"

# 性能配置
performance:
  # Jira/Confluence 爬取
  max_results_per_page: 50        # 每页获取的最大结果数
  max_workers: 10                  # 并发线程数

  # 知识检索
  knowledge_retrieval:
    max_thread_workers: 3          # 知识检索并发数
    wiki_query_timeout: 30         # Wiki 查询超时（秒）
    max_keywords: 10               # 最大关键词数
    min_keyword_length: 2          # 最小关键词长度
    max_keyword_length: 20         # 最大关键词长度
    max_description_length: 500    # 描述最大长度
    wiki_content_preview: 1000     # Wiki 内容预览长度
    keyword_extraction_max_tokens: 200   # 关键词提取最大 tokens
    concept_analysis_max_tokens: 300     # 概念分析最大 tokens
    max_search_keywords: 5         # 源文件搜索最大关键词数
    max_results_per_keyword: 3     # 每个关键词最大搜索结果数

# 缓存配置
cache:
  enabled: true
  dir: "./.cache"                 # 缓存目录
  ttl: 86400                      # 缓存有效期（秒），默认24小时

# 定时任务配置
scheduler:
  enabled: false                  # 是否启用定时同步
  sync_time: "02:00"              # 每日同步时间（24小时制）
  timezone: "Asia/Shanghai"       # 时区
  retry_on_failure: true
  retry_interval: 3600            # 失败后重试间隔（秒）

# LLM 配置
llm:
  provider: "openai"              # "mock" for testing, "openai" for OpenAI-compatible API
  base_url: "http://127.0.0.1:1234/v1"  # LM Studio, Ollama, vLLM 等兼容服务地址
  model: "qwen3.5-4b"             # 模型名称
  max_tokens: 8000  # 推理模型需要更大的 token 限制（推理过程 + 最终答案）
  temperature: 0.7
  timeout: 600  # API 调用超时时间（秒）

  # 文档分析专用 LLM 配置（覆盖上述默认值）
  doc_analysis:
    provider: llamacpp
    base_url: http://127.0.0.1:8080
    model: Qwen3.5-9B-IQ4_XS.gguf
    timeout: 120  # 文档分析超时时间（秒）
    temperature: 0.3

  # Vision LLM 配置（用于图片分析）
  vision:
    enabled: true
    provider: llamacpp
    base_url: http://127.0.0.1:9090
    model: Qwen3-VL-4B-Instruct-Q4_K_M.gguf
    timeout: 120  # 图片分析超时时间（秒）
    temperature: 0.3
    max_tokens: 1000

# 报告配置
reports:
  # 固定跟踪的 Issue 列表（在周报/月报中始终显示）
  fixed_issues:
    - "PROJ-1"
    - "PROJ-2"

  # 报告格式配置
  max_issues_per_report: 100      # 单个报告最大 issue 数
  group_by: "status"              # 分组方式: status, priority, assignee, type
  include_attachments: true       # 是否包含附件链接

# 报告分析配置
report_analysis:
  enabled: true

  # 分析器配置
  analyzers:
    summary:
      enabled: true
      max_tokens: 2000  # 推理模型需要更大的限制

    insights:
      enabled: true
      max_items: 5
      max_tokens: 3000  # 推理模型需要更大的限制

    risks:
      enabled: true
      dimensions:
        - progress    # 进度风险
        - priority    # 优先级风险
        - resource    # 资源风险
      thresholds:
        stalled_days: 7           # 停滞天数阈值
        overload_issues: 5        # 负载过重阈值
      max_tokens: 3000  # 推理模型需要更大的限制

  # LLM配置（继承全局llm配置，可覆盖）
  llm:
    temperature: 0.3  # 分析任务使用较低温度

# Jira 分析配置
jira_analysis:
  # 问题摘要配置
  issue_summary:
    enabled: true
    use_llm: true              # 使用 LLM 综合提取（false 则使用 regex）
    max_tokens: 4000           # LLM 提取最大 tokens（推理模型需要更大的限制）

    # 代码覆盖检查
    code_coverage:
      enabled: true
      source_dir: "./sources"  # 源文件目录
      max_results: 5

  # 相似问题查找配置
  similar_jira:
    max_tokens: 2000           # 相关性分析最大 tokens（推理模型需要更大的限制）

  # 根因分析配置
  root_cause:
    max_tokens: 3000           # 根因分析最大 tokens（推理模型需要更大的限制）

  # 闭环检查配置
  closed_loop:
    max_tokens: 3000           # 闭环检查最大 tokens（推理模型需要更大的限制）

  # 评论分析配置
  comments:
    max_tokens: 4000           # 评论分析最大 tokens（推理模型需要更大的限制）

  # 行动建议配置
  action_recommender:
    max_tokens: 2000           # 行动建议最大 tokens（推理模型需要更大的限制）

# 自定义分析器配置
custom_analyzers:
  - name: "技术债务评估"
    enabled: true
    prompt: |
      评估以下问题的技术债务影响：

      Issue: [{key}] {title}
      状态: {status}
      优先级: {priority}

      描述:
      {description}

      {knowledge_context}

      请从以下角度分析：
      1. 技术债务程度（低/中/高）
      2. 影响范围（模块、系统、架构）
      3. 建议优先级（立即处理/计划处理/可延后）

      要求：
      - 每个角度用 1-2 句话简洁回答
      - 直接输出分析结果，不要输出思考过程
    context:
      include_knowledge: true
      include_root_cause: false
      include_similar_jira: false
      include_comments: false
    max_tokens: 4000  # 推理模型需要更大的限制

# 日志配置
logging:
  level: "INFO"              # 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"             # 日志格式: json (结构化) 或 text (传统格式)
  output_file: null          # 可选：日志文件路径，null 表示只输出到控制台

# ============================================================================
# 配置说明
# ============================================================================

# 认证配置：
#   - API Token 生成：https://id.atlassian.com/manage-profile/security/api-tokens
#   - username: Atlassian 账号邮箱
#   - api_token: 生成的 API Token

# Confluence 高级选项：
#   - max_pages: 限制拉取的最大页面数，用于测试或初步验证
#   - root_page_id: 只抓取指定页面及其子页面，用于部分同步

# LLM 配置说明：
#   - provider: "mock" 用于测试，"openai" 用于 OpenAI 兼容 API
#   - base_url: LM Studio (http://127.0.0.1:1234/v1)
#               Ollama (http://127.0.0.1:11434/v1)
#               vLLM 或其他兼容服务
#   - model: 使用的模型名称（根据服务提供商而定）
#   - max_tokens: 生成的最大 token 数
#   - temperature: 生成温度（0-1），越高越随机

# 报告分析说明：
#   - enabled: 控制是否启用智能分析功能
#   - analyzers: 配置各个分析器的参数
#     * summary: 生成执行摘要
#     * insights: 识别关键发现和趋势
#     * risks: 评估潜在风险（进度、优先级、资源）

# 性能调优：
#   - max_workers: 并发线程数，根据网络和 API 限制调整
#   - max_results_per_page: 每页结果数，影响 API 调用次数
#   - cache.ttl: 缓存有效期，减少重复请求

# 定时任务：
#   - enabled: 是否启用自动同步
#   - sync_time: 每日同步时间（24小时制）
#   - timezone: 时区设置

# ============================================================================
# 文档分析配置
# ============================================================================
doc_analysis:
  # 文档切分配置
  splitting:
    split_level: 2              # 按 H2 标题切分
    max_chars: 5000             # 单个小节最大字符数
    strategy: "fixed"           # 拆分策略: smart(智能合并) | fixed(固定拆分)
    min_section_chars: 0        # 最小小节字符数（0 = 不过滤任何小节）
    merge_related: false        # 是否合并相关小节（长文档建议设为 false）

  # 小节过滤配置
  filtering:
    skip_empty: false           # 是否跳过空小节
    exclude_patterns: []        # 排除的小节标题模式（如 ["原始数据（JSON）", "Debug Info"]）
    min_content_ratio: 0.0      # 最小内容比例（0.0 = 不检查内容比例）

  # 检索配置
  retrieval:
    # 代码库检索
    code:
      enabled: true
      base_dir: .               # 代码库根目录
      patterns:                 # 文件类型
        - "**/*.py"
        - "**/*.js"
        - "**/*.ts"
      exclude_dirs:             # 排除目录
        - ".venv"
        - "node_modules"
        - "__pycache__"
        - ".git"
      context_lines: 3          # 匹配行的前后上下文行数

    # 需求文档检索
    docs:
      enabled: true
      path: "sources/"          # 需求文档目录
      patterns:
        - "*.md"
      exclude_files:            # 排除文件
        - "README.md"
      context_lines: 5

    # 检索策略
    search:
      max_results: 5            # 每个来源最多返回 N 个结果
      min_match_length: 3       # 最小匹配关键词长度

  # Prompt 模板
  prompts:
    system: |
      你是一个需求分析专家。你的任务是分析客户需求文档的内容，判断是否可以形成具体的需求或测试用例。

    # 关键词提取 prompt
    keyword_extraction: |
      请从以下文档内容中提取适合代码搜索的关键词。

      要求：
      1. **优先提取具体的技术术语**：类名、函数名、API 名称、协议名称、组件名称
         - 例如：NVMeController, RDMATransport, Queue Pair, CC.EN, CSTS.RDY
         - 而不是：架构、配置、系统、功能等通用词汇
      2. 保留完整的技术术语（如 "NVMe Reset" 而不是拆分成 "NVMe" 和 "Reset"）
      3. 提取大写缩写词和专有名词（如 RDMA, TCP, NVMe, Queue Pair）
      4. 提取可能出现在代码中的标识符（如 reset, connect, disconnect, send_command）
      5. 中英文关键词都要提取，但优先英文技术术语
      6. 每个关键词 2-30 个字符
      7. 提取 8-15 个最重要的关键词
      8. 只返回关键词列表，每行一个，不要序号和其他解释

      文档内容：
      {text}

      关键词：

    user_template: |
      ## 当前文档小节

      {section_content}

      ## 相关代码参考

      {code_context}

      ## 相关需求文档参考

      {docs_context}

      ## 分析任务

      请深入分析上述文档小节内容，提供以下分析：

      ### 1. 内容分类
      判断该小节属于以下哪种类型：
      - **功能需求**：描述具体的功能、行为、接口
      - **性能需求**：描述性能指标、时间要求、资源限制
      - **约束条件**：描述必须遵守的规则、标准、协议
      - **概念定义**：仅定义术语、概念、架构
      - **示例说明**：提供使用示例、场景描述
      - **其他**：说明具体类型

      ### 2. 可测试性分析
      - **是否可形成测试用例**：是/否
      - **如果可以**：列出 2-3 个具体的测试场景（包括输入、预期输出、验证点）
      - **如果不可以**：说明缺少哪些信息（如：缺少具体数值、缺少错误处理、缺少边界条件等）

      ### 3. 实现建议
      结合相关代码和文档参考，给出实现建议：
      - **如果代码已实现**：指出对应的代码位置和实现方式
      - **如果代码未实现**：建议实现方法和需要注意的点
      - **如果有差异**：指出文档与代码的不一致之处

      ### 4. 关键技术点
      提取该小节涉及的关键技术点（如：关键API、重要参数、状态转换、错误码等）

      请以清晰的 Markdown 格式输出分析结果，使用标题、列表、代码块等格式增强可读性。

    # 图片分析 prompt
    image_analysis: |
      请详细描述这张图片的内容。如果图片包含架构图、流程图、状态图等技术图表，请说明：
      1. 图表的类型和主要目的
      2. 关键组件或模块
      3. 组件之间的关系和数据流
      4. 任何重要的技术细节或标注

      请以 Markdown 格式输出分析结果。

  # 报告配置
  report:
    output_dir: "reports/"
    filename_template: "doc_analysis_{source_filename}_{timestamp}.md"
    include_toc: true           # 是否包含目录
    include_summary: true       # 是否包含总结
